document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    const templateData = JSON.parse(templateEl.textContent);
    const pages = templateData.pages;
    const entryId = templateData.entry;
    const pageIds = Object.keys(pages);

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : {};

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    // Per-page prep: substitute UUIDs, strip SRI/crossorigin (blob URLs from a
    // file:// document inherit a null origin, so crossorigin forces a CORS
    // fetch that SRI then rejects — the manifest bytes are ours; SRI protects
    // against CDN compromise, not this), and inject the page's own
    // window.__resources + the click interceptor into <head>. slice() rather
    // than replace() keeps us clear of $-pattern substitution.
    function resourcesFor(id) {
      var map = {};
      var list = extResources[id] || [];
      for (var k = 0; k < list.length; k++) {
        if (blobUrls[list[k].uuid]) map[list[k].id] = blobUrls[list[k].uuid];
      }
      return map;
    }
    for (const id of pageIds) {
      let t = pages[id];
      for (const uuid of uuids) t = t.split(uuid).join(blobUrls[uuid]);
      t = t.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

      // a blanket <base target="_parent"> would also redirect form submissions
      // and tear down the wrapper. Non-# links navigate the parent to the
      // anchor's resolved href; #/… routes forward to the parent's hash only
      // when the id is one of this bundle's own pages (author #/… links from
      // an in-page hash router are left to the scroll path so they don't yank
      // the user to the entry page); plain #frag scrolls in place.
      // composedPath + getAttribute('target') handle SVG <a> and shadow-DOM
      // anchors, which closest()/IDL .target get wrong.
      var headContent = 'window.__resources = ' + JSON.stringify(resourcesFor(id)) + ';' +

            'var a = null, p = e.composedPath ? e.composedPath() : [e.target];' +

            '}' +
            'if (!a && e.target.closest) a = e.target.closest("a, area");' +
            'if (!a || a.hasAttribute("download")) return;' +
            'var tg = a.getAttribute("target");' +
            'if (tg && tg !== "_self") return;' +
            'var h = a.getAttribute("href") || a.getAttribute("xlink:href");' +
            'if (!h || /^javascript:/i.test(h)) return;' +
            'if (h.charAt(0) !== "#") {' +
              'if (!tg) { var b = document.querySelector("base[target]"); if (b && b.getAttribute("target") !== "_self") return; }' +
              'e.preventDefault();' +
              'if (/^(?:[a-z][a-z0-9+.-]*:|\\/\\/)/i.test(h)) parent.location.assign(h);' +
              'return;' +
            '}' +
            'e.preventDefault();' +
            'if (h.slice(0, 2) === "#/") {' +
              'var c = h.indexOf(":", 2);' +
              'var pid = c < 0 ? h.slice(2) : h.slice(2, c);' +
              'try { pid = decodeURIComponent(pid); } catch(err) {}' +
              'if (window.__bundler_pages.indexOf(pid) >= 0) { parent.location.hash = h; return; }' +
            '}' +
            'var t = h.length > 1 ? document.getElementById(h.slice(1)) : null;' +
            'if (t) t.scrollIntoView({behavior:"smooth"});' +
            'else scrollTo({top:0, behavior:"smooth"});' +
          '});' : '');
      // Defuse any script end-tag sequence in the content (resource ids, page
      // ids) before wrapping — same escape level as every sibling JSON island.
      var headScript = '<script>' +
        headContent.split('</' + 'script').join('<\\/' + 'script') +
        '</' + 'script>';
      // Inject after <head> so the DOCTYPE stays first; prepending the script
      // would push the parser into quirks mode. DOMParser always emits a <head>
      // (synthesizing one if the source HTML omitted it) but may carry
      // attributes through, so match the full opening tag.
      var headOpen = t.match(/<head[^>]*>/i);
      if (headOpen) {
        var hi = headOpen.index + headOpen[0].length;
        t = t.slice(0, hi) + headScript + t.slice(hi);
      }
      pages[id] = t;
    }

    setStatus('Rendering...');

    if (pageIds.length === 1) {
      // Single page: the pre-crawl render path. Parse the template and swap the
      // root element. Scripts inserted via DOMParser/replaceWith are inert per
      // spec — re-create each with createElement so they execute, awaiting
      // onload for src scripts to preserve ordering (React before ReactDOM
      // before Babel before text/babel).
      var template = pages[entryId];
      const doc = new DOMParser().parseFromString(template, 'text/html');
      document.documentElement.replaceWith(doc.documentElement);
      const dead = Array.from(document.scripts);
      for (const old of dead) {
        const s = document.createElement('script');
        for (const a of old.attributes) s.setAttribute(a.name, a.value);
        s.textContent = old.textContent;
        // text/babel scripts with a src: fetch and inline. transformScriptTags
        // does XHR against the src, but blob:null/ from a file:// origin is
        // silently dropped. Inlining makes it a plain inline babel script,
        // which transformScriptTags handles unconditionally.
        if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
          try {
            const r = await fetch(s.src);
            s.textContent = await r.text();
            s.removeAttribute('src');
          } catch (e) {}
        }
        // Non-executable script types (text/babel, application/json, …) are
        // data blocks per spec: the browser never fetches src and never fires
        // load/error, so awaiting would hang forever.
        const exec = !s.type || s.type === 'module' || /(java|ecma)script/i.test(s.type);
        const p = (s.src && exec) ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
        old.replaceWith(s);
        if (p) await p;
      }
      // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
      // which fired before we swapped the document. Trigger manually if present.
      if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
        window.Babel.transformScriptTags();
      }
      return;
    }

    // Multi-page: render into a full-viewport srcdoc iframe so each page runs
    // in its own realm while staying same-origin with the parent (so asset
    // blob URLs load and parent.location is writable).
    var frame = document.createElement('iframe');
    frame.id = '__bundler_frame';
    frame.setAttribute('style', 'position:fixed;inset:0;width:100%;height:100%;border:0;background:#fff');
    document.body.appendChild(frame);

    function decode(s) {
      try { return decodeURIComponent(s); } catch (e) { return s; }
    }
    function route() {
      var h = (location.hash || '');
      if (h.slice(0, 2) !== '#/') return { id: entryId, anchor: '' };
      h = h.slice(2);
      var i = h.indexOf(':');
      return i < 0 ? { id: decode(h), anchor: '' }
                   : { id: decode(h.slice(0, i)), anchor: decode(h.slice(i + 1)) };
    }

    var current = null;
    var navGen = 0;
    function navigate() {
      var r = route();
      var id = Object.prototype.hasOwnProperty.call(pages, r.id) ? r.id : entryId;
      if (current === id) {
        // Same-page anchor change: the iframe's own hash handles this, so
        // normally we don't reach here. If we do (e.g. a programmatic
        // parent.location.hash change), nudge the iframe.
        var cw = frame.contentWindow;
        if (!cw) return;
        var el = r.anchor && cw.document.getElementById(r.anchor);
        if (el) el.scrollIntoView({ behavior: 'smooth' });
        else cw.scrollTo({ top: 0, behavior: 'smooth' });
        return;
      }
      current = id;
      var gen = ++navGen;
      frame.onload = function() {
        // One-shot: an iframe-internal navigation (form submit, page JS
        // location.href=) re-fires onload with the same gen; after that the
        // iframe may be cross-origin, and cw.* access would throw.
        frame.onload = null;
        if (gen !== navGen) return;
        var cw = frame.contentWindow;
        try { cw.document.title && (document.title = cw.document.title); } catch (e) {}
        var splash = document.getElementById('__bundler_thumbnail') ||
                     document.getElementById('__bundler_placeholder');
        if (splash) splash.remove();
        if (loading) loading.remove();
        var el = r.anchor && cw.document.getElementById(r.anchor);
        if (el) el.scrollIntoView();
        else cw.scrollTo(0, 0);
      };
      frame.srcdoc = pages[id];
    }

    window.addEventListener('hashchange', navigate);
    navigate();
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

isplay: swap;\n  src: url(\"b142a233-61fb-416d-a649-97e9015a303c\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Spectral';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"bc7296dc-90e5-4139-a317-66e93b25cd49\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Spectral';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"60213a96-4621-4c7a-a5cc-c099f9834756\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  * { margin:0; padding:0; box-sizing:border-box; }\n  body { background:#d8d0c0; }\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"width:1080px; margin:0 auto; background:#f2ece0; color:#17130d; font-family:'Archivo',sans-serif; padding:72px 72px 56px;\">\n\n  <!-- ======================= HEADER ======================= -->\n  <div style=\"display:flex; justify-content:space-between; align-items:center;\">\n    <img src=\"dab74381-5cb8-43ed-a0f6-dab56018713e\" alt=\"Centro Studi Circolo Caldara\" style=\"height:46px; width:auto; display:block;\">\n    <span style=\"font-family:'Archivo',sans-serif; font-size:13px; font-weight:600; letter-spacing:0.18em; text-transform:uppercase; color:#8a7d68;\">Milano · 2026<\u002Fspan>\n  <\u002Fdiv>\n  <div style=\"height:1px; background:#17130d; margin:18px 0 40px;\"><\u002Fdiv>\n\n  <h1 style=\"font-family:'Spectral',serif; font-weight:800; font-size:88px; line-height:0.96; letter-spacing:-0.02em; text-wrap:balance;\">La geografia<br>dell’abbandono<\u002Fh1>\n\n  <p style=\"font-family:'Spectral',serif; font-weight:300; font-size:27px; line-height:1.42; color:#3a3225; max-width:760px; margin-top:28px; text-wrap:pretty;\">A Milano la dispersione scolastica non è diffusa a caso: segue, quasi millimetro per millimetro, la mappa del <span style=\"font-style:italic; color:#bf3c2a;\">mercato immobiliare<\u002Fspan>. Dove la casa costa meno, più ragazzi lasciano la scuola prima del diploma.<\u002Fp>\n\n  <!-- ======================= HERO: LA LEGGE INVERSA ======================= -->\n  <div style=\"margin-top:54px; border:1px solid #17130d; background:#fbf8f1;\">\n    <div style=\"padding:22px 30px; border-bottom:1px solid #17130d; display:flex; justify-content:space-between; align-items:center;\">\n      <span style=\"font-family:'Archivo',sans-serif; font-weight:700; font-size:15px; letter-spacing:0.14em; text-transform:uppercase;\">La legge inversa<\u002Fspan>\n      <span style=\"font-family:'Archivo',sans-serif; font-weight:500; font-size:14px; color:#8a7d68; letter-spacing:0.04em;\">Dispersione · giovani 15–24 usciti prima del diploma<\u002Fspan>\n    <\u002Fdiv>\n\n    <div style=\"display:grid; grid-template-columns:1fr 1px 1fr;\">\n      <!-- COLD / affluent -->\n      <div style=\"padding:42px 40px 44px; background:#e6efeb;\">\n        <div style=\"font-family:'Archivo',sans-serif; font-weight:700; font-size:15px; letter-spacing:0.05em; color:#1c5a54; text-transform:uppercase;\">Case oltre 5.000 €/m²<\u002Fdiv>\n        <div style=\"font-family:'Spectral',serif; font-weight:800; font-size:108px; line-height:0.9; color:#1c5a54; margin-top:18px;\">0,2<span style=\"font-size:54px;\">–<\u002Fspan>4,1<span style=\"font-size:54px;\">%<\u002Fspan><\u002Fdiv>\n        <div style=\"font-family:'Archivo',sans-serif; font-weight:500; font-size:17px; line-height:1.4; color:#3a4f49; margin-top:18px;\">Nei quartieri di pregio l’abbandono quasi sparisce.<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"background:#17130d;\"><\u002Fdiv>\n\n      <!-- HOT / deprived -->\n      <div style=\"padding:42px 40px 44px; background:#f5e2db;\">\n        <div style=\"font-family:'Archivo',sans-serif; font-weight:700; font-size:15px; letter-spacing:0.05em; color:#bf3c2a; text-transform:uppercase;\">Case sotto 3.800 €/m²<\u002Fdiv>\n        <div style=\"font-family:'Spectral',serif; font-weight:800; font-size:108px; line-height:0.9; color:#bf3c2a; margin-top:18px;\">fino al<br><span style=\"font-size:140px;\">24%<\u002Fspan><\u002Fdiv>\n        <div style=\"font-family:'Archivo',sans-serif; font-weight:500; font-size:17px; line-height:1.4; color:#6b3327; margin-top:18px;\">Dove i prezzi crollano, fino a un giovane su quattro esce dal sistema.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"padding:20px 30px; border-top:1px solid #17130d; background:#17130d; color:#f2ece0; font-family:'Archivo',sans-serif; font-weight:600; font-size:17px; letter-spacing:0.02em; display:flex; align-items:center; gap:14px;\">\n      <span style=\"font-family:'Spectral',serif; font-weight:800; font-size:30px; color:#e8a08c;\">≈ 6×<\u002Fspan>\n      <span style=\"color:#d9d0bf;\">più dispersione nei quartieri a basso valore immobiliare rispetto a quelli di pregio.<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ======================= QUARTIERE RANKING ======================= -->\n  <div style=\"margin-top:64px;\">\n    <div style=\"display:flex; align-items:baseline; gap:16px;\">\n      <h2 style=\"font-family:'Spectral',serif; font-weight:800; font-size:42px; letter-spacing:-0.01em;\">Quartiere per quartiere<\u002Fh2>\n    <\u002Fdiv>\n    <p style=\"font-family:'Archivo',sans-serif; font-weight:500; font-size:17px; color:#5c5346; margin-top:10px; max-width:740px; line-height:1.45;\">Tra il Nucleo di Identità Locale (NIL) con la dispersione più alta e quello con la più bassa corrono quasi <strong style=\"color:#17130d;\">20 punti percentuali<\u002Fstrong> — nella stessa città amministrativa.<\u002Fp>\n\n    <!-- highest -->\n    <div style=\"margin-top:32px; font-family:'Archivo',sans-serif; font-weight:700; font-size:13px; letter-spacing:0.14em; text-transform:uppercase; color:#bf3c2a;\">I tre quartieri con più abbandono<\u002Fdiv>\n    <div style=\"margin-top:16px; display:flex; flex-direction:column; gap:11px;\">\n      <!-- bar row template -->\n      <div style=\"display:grid; grid-template-columns:200px 1fr 64px; align-items:center; gap:16px;\">\n        <span style=\"font-family:'Archivo',sans-serif; font-weight:600; font-size:18px;\">Comasina<\u002Fspan>\n        <div style=\"height:30px; background:#ece4d4;\"><div style=\"height:100%; width:92%; background:#bf3c2a;\"><\u002Fdiv><\u002Fdiv>\n        <span style=\"font-family:'Spectral',serif; font-weight:800; font-size:24px; color:#bf3c2a; text-align:right;\">23,0<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:grid; grid-template-columns:200px 1fr 64px; align-items:center; gap:16px;\">\n        <span style=\"font-family:'Archivo',sans-serif; font-weight:600; font-size:18px;\">Quarto Oggiaro<\u002Fspan>\n        <div style=\"height:30px; background:#ece4d4;\"><div style=\"height:100%; width:91.6%; background:#bf3c2a;\"><\u002Fdiv><\u002Fdiv>\n        <span style=\"font-family:'Spectral',serif; font-weight:800; font-size:24px; color:#bf3c2a; text-align:right;\">22,9<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:grid; grid-template-columns:200px 1fr 64px; align-items:center; gap:16px;\">\n        <span style=\"font-family:'Archivo',sans-serif; font-weight:600; font-size:18px;\">Farini<\u002Fspan>\n        <div style=\"height:30px; background:#ece4d4;\"><div style=\"height:100%; width:88.8%; background:#bf3c2a;\"><\u002Fdiv><\u002Fdiv>\n        <span style=\"font-family:'Spectral',serif; font-weight:800; font-size:24px; color:#bf3c2a; text-align:right;\">22,2<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- lowest -->\n    <div style=\"margin-top:30px; font-family:'Archivo',sans-serif; font-weight:700; font-size:13px; letter-spacing:0.14em; text-transform:uppercase; color:#1c5a54;\">I quattro quartieri con meno abbandono<\u002Fdiv>\n    <div style=\"margin-top:16px; display:flex; flex-direction:column; gap:11px;\">\n      <div style=\"display:grid; grid-template-columns:200px 1fr 64px; align-items:center; gap:16px;\">\n        <span style=\"font-family:'Archivo',sans-serif; font-weight:600; font-size:18px;\">Duomo<\u002Fspan>\n        <div style=\"height:30px; background:#ece4d4;\"><div style=\"height:100%; width:20.8%; background:#1c5a54;\"><\u002Fdiv><\u002Fdiv>\n        <span style=\"font-family:'Spectral',serif; font-weight:800; font-size:24px; color:#1c5a54; text-align:right;\">5,2<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:grid; grid-template-columns:200px 1fr 64px; align-items:center; gap:16px;\">\n        <span style=\"font-family:'Archivo',sans-serif; font-weight:600; font-size:18px;\">Brera<\u002Fspan>\n        <div style=\"height:30px; background:#ece4d4;\"><div style=\"height:100%; width:16.8%; background:#1c5a54;\"><\u002Fdiv><\u002Fdiv>\n        <span style=\"font-family:'Spectral',serif; font-weight:800; font-size:24px; color:#1c5a54; text-align:right;\">4,2<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:grid; grid-template-columns:200px 1fr 64px; align-items:center; gap:16px;\">\n        <span style=\"font-family:'Archivo',sans-serif; font-weight:600; font-size:18px;\">Vigentina<\u002Fspan>\n        <div style=\"height:30px; background:#ece4d4;\"><div style=\"height:100%; width:14.4%; background:#1c5a54;\"><\u002Fdiv><\u002Fdiv>\n        <span style=\"font-family:'Spectral',serif; font-weight:800; font-size:24px; color:#1c5a54; text-align:right;\">3,6<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:grid; grid-template-columns:200px 1fr 64px; align-items:center; gap:16px;\">\n        <span style=\"font-family:'Archivo',sans-serif; font-weight:600; font-size:18px;\">Pagano<\u002Fspan>\n        <div style=\"height:30px; background:#ece4d4;\"><div style=\"height:100%; width:12.8%; background:#1c5a54;\"><\u002Fdiv><\u002Fdiv>\n        <span style=\"font-family:'Spectral',serif; font-weight:800; font-size:24px; color:#1c5a54; text-align:right;\">3,2<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"margin-top:14px; font-family:'Archivo',sans-serif; font-weight:500; font-size:13px; color:#8a7d68; letter-spacing:0.02em;\">Tasso di dispersione scolastica per NIL, valori percentuali.<\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ======================= MAPPA ======================= -->\n  <div style=\"margin-top:64px;\">\n    <h2 style=\"font-family:'Spectral',serif; font-weight:800; font-size:42px; letter-spacing:-0.01em;\">Dove, in città<\u002Fh2>\n    <p style=\"font-family:'Archivo',sans-serif; font-weight:500; font-size:17px; color:#5c5346; margin-top:10px; max-width:780px; line-height:1.45;\">Colorando <strong style=\"color:#17130d;\">tutti gli 88 quartieri<\u002Fstrong>, il gradiente è netto: la dispersione resta bassa nel cuore cittadino e si accende nelle frange — a nord, a ovest e, soprattutto, nell’estremo <strong style=\"color:#17130d;\">sud-est<\u002Fstrong>, dove tocca il 28%.<\u002Fp>\n\n    <div style=\"margin-top:26px; border:1px solid #17130d; background:#fbf8f1; padding:26px 24px 22px;\">\n      <iframe src=\"mappa-interattiva.html\" title=\"Mappa interattiva della dispersione scolastica per quartiere\" loading=\"lazy\" style=\"width:100%; aspect-ratio:900 / 809; border:0; display:block; background:#f2ece0;\"><\u002Fiframe>\n      \n    <\u002Fdiv>\n    <div style=\"margin-top:12px; font-family:'Archivo',sans-serif; font-weight:500; font-size:12px; color:#8a7d68; line-height:1.5;\">Confini reali degli 88 Nuclei d’Identità Locale (NIL), Comune di Milano — PGT 2030. Dato: uscita precoce dall’istruzione, 18–24 anni (ELET) · ISTAT, Censimento permanente 2021, elaborazione Openpolis–Con i Bambini, «Giovani e periferie» 2025. In grigio i 16 NIL senza dato (ambiti agricoli e a parco). <em>Fonte e definizione diverse dai valori dell’Osservatorio Scuole riportati nel grafico precedente: i due non sono direttamente confrontabili.<\u002Fem><\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ======================= TWO STATS ======================= -->\n  <div style=\"margin-top:60px; display:grid; grid-template-columns:1fr 1fr; gap:24px;\">\n    <!-- laurea gap -->\n    <div style=\"border:1px solid #17130d; background:#fbf8f1; padding:34px 32px 36px;\">\n      <div style=\"font-family:'Archivo',sans-serif; font-weight:700; font-size:13px; letter-spacing:0.14em; text-transform:uppercase; color:#8a7d68;\">Adulti con laurea<\u002Fdiv>\n      <div style=\"font-family:'Spectral',serif; font-weight:800; font-size:92px; line-height:0.9; margin-top:14px;\">1 <span style=\"font-weight:300; font-size:46px;\">su<\u002Fspan> 7<\u002Fdiv>\n      <div style=\"margin-top:22px; display:flex; flex-direction:column; gap:12px;\">\n        <div style=\"display:flex; justify-content:space-between; align-items:baseline; border-top:1px solid #e0d8c8; padding-top:10px;\">\n          <span style=\"font-family:'Archivo',sans-serif; font-weight:600; font-size:16px;\">Pagano · Magenta<\u002Fspan>\n          <span style=\"font-family:'Spectral',serif; font-weight:800; font-size:26px; color:#1c5a54;\">51,2%<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"display:flex; justify-content:space-between; align-items:baseline; border-top:1px solid #e0d8c8; padding-top:10px;\">\n          <span style=\"font-family:'Archivo',sans-serif; font-weight:600; font-size:16px;\">Quarto Oggiaro<\u002Fspan>\n          <span style=\"font-family:'Spectral',serif; font-weight:800; font-size:26px; color:#bf3c2a;\">7,6%<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- NEET gap -->\n    <div style=\"border:1px solid #17130d; background:#fbf8f1; padding:34px 32px 36px;\">\n      <div style=\"font-family:'Archivo',sans-serif; font-weight:700; font-size:13px; letter-spacing:0.14em; text-transform:uppercase; color:#8a7d68;\">NEET · né studio né lavoro · 15–29 anni<\u002Fdiv>\n      <div style=\"font-family:'Spectral',serif; font-weight:800; font-size:92px; line-height:0.9; margin-top:14px; color:#bf3c2a;\">32,1%<\u002Fdiv>\n      <div style=\"margin-top:22px; display:flex; flex-direction:column; gap:12px;\">\n        <div style=\"display:flex; justify-content:space-between; align-items:baseline; border-top:1px solid #e0d8c8; padding-top:10px;\">\n          <span style=\"font-family:'Archivo',sans-serif; font-weight:600; font-size:16px;\">Parco Monluè · Ponte Lambro<\u002Fspan>\n          <span style=\"font-family:'Spectral',serif; font-weight:800; font-size:26px; color:#bf3c2a;\">32,1%<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"display:flex; justify-content:space-between; align-items:baseline; border-top:1px solid #e0d8c8; padding-top:10px;\">\n          <span style=\"font-family:'Archivo',sans-serif; font-weight:600; font-size:16px;\">Ripamonti<\u002Fspan>\n          <span style=\"font-family:'Spectral',serif; font-weight:800; font-size:26px; color:#1c5a54;\">14,6%<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ======================= CONTEXT STRIP ======================= -->\n  <div style=\"margin-top:60px; border-top:1px solid #17130d; padding-top:40px;\">\n    <h2 style=\"font-family:'Spectral',serif; font-weight:800; font-size:34px; letter-spacing:-0.01em;\">Il contesto<\u002Fh2>\n    <div style=\"margin-top:26px; display:grid; grid-template-columns:1fr 1fr 1fr; gap:32px;\">\n\n      <!-- per tipo scuola -->\n      <div>\n        <div style=\"font-family:'Archivo',sans-serif; font-weight:700; font-size:13px; letter-spacing:0.1em; text-transform:uppercase; color:#8a7d68; min-height:34px;\">Dispersione per tipo di scuola<\u002Fdiv>\n        <div style=\"margin-top:16px; display:flex; flex-direction:column; gap:12px;\">\n          <div>\n            <div style=\"display:flex; justify-content:space-between; font-family:'Archivo',sans-serif; font-weight:600; font-size:15px;\"><span>Licei<\u002Fspan><span>1,6%<\u002Fspan><\u002Fdiv>\n            <div style=\"height:8px; background:#ece4d4; margin-top:6px;\"><div style=\"height:100%; width:16%; background:#1c5a54;\"><\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n          <div>\n            <div style=\"display:flex; justify-content:space-between; font-family:'Archivo',sans-serif; font-weight:600; font-size:15px;\"><span>Tecnici<\u002Fspan><span>3,8%<\u002Fspan><\u002Fdiv>\n            <div style=\"height:8px; background:#ece4d4; margin-top:6px;\"><div style=\"height:100%; width:38%; background:#c98a3a;\"><\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n          <div>\n            <div style=\"display:flex; justify-content:space-between; font-family:'Archivo',sans-serif; font-weight:600; font-size:15px;\"><span>Professionali<\u002Fspan><span>7,2%<\u002Fspan><\u002Fdiv>\n            <div style=\"height:8px; background:#ece4d4; margin-top:6px;\"><div style=\"height:100%; width:72%; background:#bf3c2a;\"><\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- trend -->\n      <div>\n        <div style=\"font-family:'Archivo',sans-serif; font-weight:700; font-size:13px; letter-spacing:0.1em; text-transform:uppercase; color:#8a7d68; min-height:34px;\">Dispersione esplicita in Lombardia<\u002Fdiv>\n        <div style=\"margin-top:16px; display:flex; align-items:flex-end; gap:8px;\">\n          <div style=\"font-family:'Spectral',serif; font-weight:800; font-size:52px; line-height:0.9; color:#8a7d68;\">13,1%<\u002Fdiv>\n          <div style=\"font-family:'Spectral',serif; font-weight:300; font-size:30px; color:#8a7d68; padding-bottom:6px;\">→<\u002Fdiv>\n          <div style=\"font-family:'Spectral',serif; font-weight:800; font-size:52px; line-height:0.9; color:#1c5a54;\">6,6%<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"font-family:'Archivo',sans-serif; font-weight:500; font-size:14px; color:#5c5346; margin-top:10px; line-height:1.4;\">Dimezzata dal 2018 al 2025. Ma la città di Milano resta al <strong style=\"color:#17130d;\">12,4%<\u002Fstrong> (2021), sopra la media regionale.<\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- famiglie -->\n      <div>\n        <div style=\"font-family:'Archivo',sans-serif; font-weight:700; font-size:13px; letter-spacing:0.1em; text-transform:uppercase; color:#8a7d68; min-height:34px;\">Famiglie in difficoltà economica che non possono permettersi<\u002Fdiv>\n        <div style=\"margin-top:16px; display:flex; flex-direction:column; gap:14px;\">\n          <div style=\"display:flex; align-items:baseline; gap:12px; border-top:1px solid #e0d8c8; padding-top:10px;\"><span style=\"font-family:'Spectral',serif; font-weight:800; font-size:34px; color:#bf3c2a; min-width:78px;\">38%<\u002Fspan><span style=\"font-family:'Archivo',sans-serif; font-weight:500; font-size:15px; color:#3a3225;\">attività sportive<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex; align-items:baseline; gap:12px; border-top:1px solid #e0d8c8; padding-top:10px;\"><span style=\"font-family:'Spectral',serif; font-weight:800; font-size:34px; color:#bf3c2a; min-width:78px;\">37%<\u002Fspan><span style=\"font-family:'Archivo',sans-serif; font-weight:500; font-size:15px; color:#3a3225;\">il doposcuola<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex; align-items:baseline; gap:12px; border-top:1px solid #e0d8c8; padding-top:10px;\"><span style=\"font-family:'Spectral',serif; font-weight:800; font-size:34px; color:#bf3c2a; min-width:78px;\">20%<\u002Fspan><span style=\"font-family:'Archivo',sans-serif; font-weight:500; font-size:15px; color:#3a3225;\">i libri scolastici<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ======================= PULL QUOTE ======================= -->\n  <div style=\"margin-top:58px; background:#17130d; color:#f2ece0; padding:48px 52px;\">\n    <div style=\"font-family:'Spectral',serif; font-weight:300; font-style:italic; font-size:34px; line-height:1.34; text-wrap:pretty;\">«Due città che occupano lo stesso spazio urbano senza condividere le stesse opportunità.»<\u002Fdiv>\n    <div style=\"font-family:'Archivo',sans-serif; font-weight:600; font-size:15px; letter-spacing:0.08em; text-transform:uppercase; color:#a89a80; margin-top:24px;\">La scuola, da ascensore sociale, troppo spesso funziona come sigillo.<\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ======================= FOOTER / METHODOLOGY ======================= -->\n  <sc-if value=\"{{ showMethodology }}\" hint-placeholder-val=\"{{ true }}\">\n  <div style=\"margin-top:34px; display:grid; grid-template-columns:1fr 1fr; gap:32px; font-family:'Archivo',sans-serif;\">\n    <div>\n      <div style=\"font-weight:700; font-size:12px; letter-spacing:0.12em; text-transform:uppercase; color:#8a7d68;\">Fonte<\u002Fdiv>\n      <div style=\"font-size:14px; line-height:1.5; color:#5c5346; margin-top:8px;\">Danilo Aprigliano, <a href=\"https://www.heymilano.it/wp-content/uploads/2026/05/2026_Aprigliano_Oltre-il-muro-FINALE-Caldara.pdf\" target=\"_blank\" rel=\"noopener\" style=\"color:inherit;text-decoration:underline;text-underline-offset:2px;\"><span style=\"font-style:italic;\">«Oltre il muro e i frammenti. La scuola come infrastruttura civile di Milano»<\u002Fspan></a>, Centro Studi Circolo Caldara, Milano 2026.<\u002Fdiv>\n    <\u002Fdiv>\n    <div>\n      <div style=\"font-weight:700; font-size:12px; letter-spacing:0.12em; text-transform:uppercase; color:#8a7d68;\">Dati<\u002Fdiv>\n      <div style=\"font-size:14px; line-height:1.5; color:#5c5346; margin-top:8px;\">Osservatorio Cittadino sulle Scuole di Milano, Fondazione ISMU, Fondazione Arché · ISTAT Censimento 2021 · Eurostat LFS 2024 · INVALSI 2023 · Openpolis–Con i Bambini, «Giovani e periferie» 2025 · CIAI, «Povertà educativa a Milano» 2024 · BES Città Metropolitana di Milano 2025.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <div style=\"margin-top:48px; text-align:center;\"><a href=\"https://www.heymilano.it/wp-content/uploads/2026/05/2026_Aprigliano_Oltre-il-muro-FINALE-Caldara.pdf\" target=\"_blank\" rel=\"noopener\" style=\"display:inline-block; font-family:'Archivo',sans-serif; font-weight:700; font-size:14px; letter-spacing:0.06em; text-transform:uppercase; color:#f2ece0; background:#17130d; padding:16px 30px; text-decoration:none; border:1px solid #17130d;\">Leggi il saggio integrale (PDF) →<\u002Fa><\u002Fdiv>\n\n  <div style=\"margin-top:30px; text-align:center; font-family:'Archivo',sans-serif; font-size:13px; line-height:1.6; color:#8a7d68;\">Elaborazione, analisi dei dati e visualizzazione: <a href=\"https://daniloaprigliano.it\" target=\"_blank\" rel=\"noopener\" style=\"color:#8a7d68; text-decoration:underline; text-underline-offset:2px;\">Danilo Aprigliano<\u002Fa> · 2026 · Licenza CC BY 4.0<\u002Fdiv>\n\n<\u002Fdiv>\n\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1080,&quot;height&quot;:2820},&quot;showMethodology&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;}}\">\nclass Component extends DCLogic {\n  renderVals() {\n    return {\n      showMethodology: this.props.showMethodology ?? true,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"},"entry":"Geografia dell'abbandono.dc"}
