<div id="tt"></div>
<script>
var tt=document.getElementById('tt');
document.querySelectorAll('path').forEach(function(p){
  p.addEventListener('mousemove',function(e){
    tt.innerHTML='<b>'+p.dataset.n+'</b><br><span class="v">'+p.dataset.v+'</span><br><small>fonte: '+(p.dataset.f||'n.d.')+'</small>';
    tt.style.opacity=1;
    var x=e.clientX+14,y=e.clientY+14;
    if(x>window.innerWidth-250)x=e.clientX-250;
    if(y>window.innerHeight-90)y=e.clientY-90;
    tt.style.left=x+'px';tt.style.top=y+'px';
  });
  p.addEventListener('mouseleave',function(){tt.style.opacity=0;});
  p.addEventListener('click',function(e){
    tt.innerHTML='<b>'+p.dataset.n+'</b><br><span class="v">'+p.dataset.v+'</span><br><small>fonte: '+(p.dataset.f||'n.d.')+'<br>prezzo: '+p.dataset.p+' €/m² · laureati: '+p.dataset.l+'</small>';
    tt.style.opacity=1;tt.style.left=(e.clientX+14)+'px';tt.style.top=(e.clientY+14)+'px';
  });
});
</script>
